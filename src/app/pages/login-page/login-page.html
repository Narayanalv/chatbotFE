<app-header />
<main class="w-full flex items-center justify-center p-4 min-h-[calc(100vh-5rem)] pb-16">
    <!-- Flip Container -->
    <div class="flip-container w-full max-w-[440px]">
        <div class="flip-inner" [class.is-flipped]="!isLoginPage">

            <!-- FRONT: Login Form -->
            <div class="flip-front flex flex-col gap-8 pb-10">
                <!-- Header Text -->
                <div class="flex flex-col gap-1.5">
                    <!-- Standard SaaS Logo Placement -->
                    <div class="flex items-center gap-2 mb-2">
                        <img class="w-10 h-10" src="assets/logo.png" alt="ChatBot AI Logo">
                        <span class="text-xl font-extrabold tracking-tight text-gray-900 dark:text-white">ChatBot <span
                                class="text-blue-600 dark:text-[#6875f5]">AI</span></span>
                    </div>
                    <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">Sign in to your
                        account</h2>
                    <p class="text-[0.95rem] text-gray-600 dark:text-gray-400 font-medium">
                        Already a member? <button type="button" (click)="toggleForm()"
                            class="text-blue-600 dark:text-[#6875f5] hover:underline hover:text-blue-700 transition-colors bg-transparent border-none p-0 cursor-pointer text-[0.95rem] font-medium">
                            Register here</button>
                    </p>
                </div>

                <!-- Form Elements -->
                <form class="flex flex-col gap-5"
                    (submit)="$event.preventDefault(); login(email.value, password.value, rememberMe.checked)">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-bold text-gray-900 dark:text-white">Email address</label>
                        <input #email type="email"
                            class="w-full px-3.5 py-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#1a1c23] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 dark:focus:ring-[#6875f5]/50 dark:focus:border-[#6875f5] shadow-sm transition-all" />
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-bold text-gray-900 dark:text-white">Password</label>
                        <input #password minlength="8" [min]="'8'" type="password"
                            class="w-full px-3.5 py-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#1a1c23] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 dark:focus:ring-[#6875f5]/50 dark:focus:border-[#6875f5] shadow-sm transition-all" />
                    </div>

                    <div class="flex items-center justify-between pt-1">
                        <label class="flex items-center gap-2.5 cursor-pointer group">
                            <input #rememberMe type="checkbox"
                                class="w-4 h-4 rounded border-gray-300 dark:border-gray-700 text-blue-600 dark:text-[#6875f5] focus:ring-blue-500 dark:focus:ring-[#6875f5] dark:bg-[#1a1c23] bg-white transition-colors cursor-pointer" />
                            <span
                                class="text-sm text-gray-700 dark:text-gray-300 font-medium group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Remember
                                me</span>
                        </label>
                        <a href="#"
                            class="text-sm text-blue-600 dark:text-[#6875f5] hover:underline hover:text-blue-700 font-bold transition-colors">Forgot
                            password?</a>
                    </div>

                    <button type="submit" [disabled]="isLoading"
                        class="w-full bg-blue-600 dark:bg-[#6875f5] hover:bg-blue-700 dark:hover:bg-[#5865e5] disabled:bg-gray-400 disabled:cursor-not-allowed text-white font-bold py-2.5 rounded-lg shadow-sm transition-colors mt-2 tracking-wide">
                        {{ isLoading ? 'Signing in...' : 'Sign in' }}
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative flex items-center justify-center my-2">
                    <div class="flex border-t grow border-gray-200 dark:border-gray-700"></div>
                    <span
                        class="px-4 text-sm text-gray-500 dark:text-gray-400 font-bold bg-transparent transition-colors duration-300">Or
                        continue with</span>
                    <div class="flex border-t grow border-gray-200 dark:border-gray-700"></div>
                </div>

                <!-- Social Logins -->
                <div>
                    <button type="button"
                        class="w-full flex items-center justify-center gap-3 px-4 py-2.5 border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#202532] hover:bg-gray-50 dark:hover:bg-[#282d3c] text-gray-700 dark:text-white font-bold rounded-lg shadow-sm transition-colors">
                        <!-- Google SVG Logo -->
                        <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        Google
                    </button>
                </div>
            </div>

            <!-- BACK: Register Form -->
            <div class="flip-back flex flex-col gap-8 pb-10">
                @if (!isOtpMode) {
                <!-- Header Text -->
                <div class="flex flex-col gap-1.5">
                    <!-- Standard SaaS Logo Placement -->
                    <div class="flex items-center gap-2 mb-2">
                        <img class="w-10 h-10" src="assets/logo.png" alt="ChatBot AI Logo">
                        <span class="text-xl font-extrabold tracking-tight text-gray-900 dark:text-white">ChatBot <span
                                class="text-blue-600 dark:text-[#6875f5]">AI</span></span>
                    </div>
                    <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">Create an account
                    </h2>
                    <p class="text-[0.95rem] text-gray-600 dark:text-gray-400 font-medium">
                        Already a member? <button type="button" (click)="toggleForm()"
                            class="text-blue-600 dark:text-[#6875f5] hover:underline hover:text-blue-700 transition-colors bg-transparent border-none p-0 cursor-pointer text-[0.95rem] font-medium">Sign
                            in here</button>
                    </p>
                </div>

                <!-- Form Elements -->
                <form class="flex flex-col gap-5"
                    (submit)="$event.preventDefault(); register(reName.value, reEmail.value, rePassword.value, reConfirmPassword.value)">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-bold text-gray-900 dark:text-white">Full name</label>
                        <input #reName type="text" minlength="3"
                            class="w-full px-3.5 py-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#1a1c23] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 dark:focus:ring-[#6875f5]/50 dark:focus:border-[#6875f5] shadow-sm transition-all" />
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-bold text-gray-900 dark:text-white">Email address</label>
                        <input #reEmail type="email"
                            class="w-full px-3.5 py-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#1a1c23] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 dark:focus:ring-[#6875f5]/50 dark:focus:border-[#6875f5] shadow-sm transition-all" />
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="max-w-sm w-full">
                            <label class="block mb-2 text-sm text-foreground">Password</label>
                            <div class="relative">
                                <input #rePassword minlength="8" id="hs-toggle-password"
                                    [type]="viewPasword ? 'text' : 'password'"
                                    class="w-full px-3.5 py-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#1a1c23] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 dark:focus:ring-[#6875f5]/50 dark:focus:border-[#6875f5] shadow-sm transition-all"
                                    placeholder="Enter password" value="12345qwerty">
                                <button type="button" (click)="togglePassword()"
                                    class="absolute inset-y-0 inset-e-5 flex items-center z-20 cursor-pointer text-muted-foreground rounded-e-md focus:outline-hidden focus:text-primary-focus">
                                    <svg class="shrink-0 size-3.5" width="24" height="24" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        @if (!viewPasword) {
                                        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                                        <path
                                            d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                                        <path
                                            d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                                        <line x1="2" x2="22" y1="2" y2="22" />
                                        } @else {
                                        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                        <circle cx="12" cy="12" r="3" />
                                        }
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="max-w-sm w-full">
                            <label class="block mb-2 text-sm text-foreground">Password</label>
                            <div class="relative">
                                <input id="hs-toggle-password" #reConfirmPassword
                                    [type]="viewCPassword ? 'text' : 'password'"
                                    class="w-full px-3.5 py-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#1a1c23] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 dark:focus:ring-[#6875f5]/50 dark:focus:border-[#6875f5] shadow-sm transition-all"
                                    placeholder="Enter password" value="12345qwerty">
                                <button type="button" (click)="toggleCPassword()"
                                    class="absolute inset-y-0 inset-e-5 flex items-center z-20 ml-5 cursor-pointer text-muted-foreground rounded-e-md focus:outline-hidden focus:text-primary-focus">
                                    <svg class="shrink-0 size-3.5" width="24" height="24" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        @if (!viewCPassword) {
                                        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                                        <path
                                            d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                                        <path
                                            d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                                        <line x1="2" x2="22" y1="2" y2="22" />
                                        } @else {
                                        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                        <circle cx="12" cy="12" r="3" />
                                        }
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" [disabled]="isLoading"
                        class="w-full bg-blue-600 dark:bg-[#6875f5] hover:bg-blue-700 dark:hover:bg-[#5865e5] disabled:bg-gray-400 disabled:cursor-not-allowed text-white font-bold py-2.5 rounded-lg shadow-sm transition-colors mt-2 tracking-wide">
                        {{ isLoading ? 'Creating account...' : 'Create account' }}
                    </button>

                    <!-- Divider for Register -->
                    <div class="relative flex items-center justify-center my-2">
                        <div class="flex border-t grow border-gray-200 dark:border-gray-700"></div>
                        <span
                            class="px-4 text-sm text-gray-500 dark:text-gray-400 font-bold bg-transparent transition-colors duration-300">Or
                            register with</span>
                        <div class="flex border-t grow border-gray-200 dark:border-gray-700"></div>
                    </div>

                    <button type="button"
                        class="w-full flex items-center justify-center gap-3 px-4 py-2.5 border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#202532] hover:bg-gray-50 dark:hover:bg-[#282d3c] text-gray-700 dark:text-white font-bold rounded-lg shadow-sm transition-colors">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                        Google
                    </button>
                </form>
                } @else {
                <!-- Verification OTP View -->
                <div class="flex flex-col gap-1.5">
                    <div class="flex items-center gap-2 mb-2">
                        <img class="w-10 h-10" src="assets/logo.png" alt="ChatBot AI Logo">
                        <span class="text-xl font-extrabold tracking-tight text-gray-900 dark:text-white">ChatBot <span
                                class="text-blue-600 dark:text-[#6875f5]">AI</span></span>
                    </div>
                    <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">Verify email</h2>
                    <p class="text-[0.95rem] text-gray-600 dark:text-gray-400 font-medium">
                        We've sent a 6-digit code to your email address.
                    </p>
                </div>

                <form class="flex flex-col gap-5" (submit)="$event.preventDefault(); verifyOtp(otp.value)">
                    <div class="flex flex-col gap-1.5 mt-2">
                        <label class="text-sm font-bold text-gray-900 dark:text-white">Verification Code</label>
                        <input #otp type="text" inputmode="numeric" maxlength="6" pattern="[0-9]*"
                            placeholder="• • • • • •"
                            class="w-full tracking-[0.5em] text-center text-xl font-medium px-3.5 py-3 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#1a1c23] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 dark:focus:ring-[#6875f5]/50 dark:focus:border-[#6875f5] shadow-sm transition-all" />
                    </div>

                    <button type="submit" [disabled]="isLoading"
                        class="w-full bg-blue-600 dark:bg-[#6875f5] hover:bg-blue-700 dark:hover:bg-[#5865e5] disabled:bg-gray-400 disabled:cursor-not-allowed text-white font-bold py-2.5 rounded-lg shadow-sm transition-colors mt-2 tracking-wide">
                        {{ isLoading ? 'Verifying...' : 'Verify Account' }}
                    </button>

                    <p class="text-center mt-2">
                        <button type="button" (click)="backToRegister()"
                            class="text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors bg-transparent border-none p-0 cursor-pointer text-sm font-bold">
                            ← Back to register
                        </button>
                    </p>
                </form>
                }
            </div>

        </div>
    </div>
</main>
