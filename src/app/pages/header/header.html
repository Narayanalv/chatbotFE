<header
    class="w-full h-20 bg-gray-400 dark:bg-[#1a1c23] border-b border-gray-200 dark:border-gray-800 transition-colors duration-300 flex items-center justify-between px-4 sm:px-8 shadow-sm">
    <!-- Brand -->
    <div class="flex items-center gap-2">
        <img class="w-20 h-20" src="assets/logo.png" alt="MultiChat AI Logo">
        <h1 class="text-xl font-extrabold tracking-tight text-gray-900 dark:text-white">ChatBot <span
                class="text-blue-600">AI</span></h1>
    </div>

    <!-- Navigation -->
    <nav class="hidden md:flex items-center gap-8">
        @if(isUserLogin) {
        <a routerLink="/dashboard"
            class="text-sm font-semibold text-black dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Dashboard</a>
        }
        <a href="#"
            class="text-sm font-semibold text-black dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Features</a>
        <a href="#"
            class="text-sm font-semibold text-black dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Technology
            (RAG)</a>
        <a href="#"
            class="text-sm font-semibold text-black dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">How
            it Works</a>
        <a href="#"
            class="text-sm font-semibold text-black dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">About</a>
    </nav>

    <!-- Actions -->
    <div class="flex items-center gap-4">
        <!-- Theme Toggle -->
        <button (click)="toggleTheme()"
            class="h-9 w-9 flex items-center justify-center rounded-lg p-1.5 border border-gray-200 dark:border-gray-700 hover:bg-gray-900 dark:hover:bg-gray-100 transition-colors text-gray-600 dark:text-gray-300">
            <svg class="fill-current w-5 h-5 hidden dark:block" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
            </svg>
            <svg class="fill-current w-5 h-5 block dark:hidden" viewBox="0 0 20 20">
                <path
                    d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
                    fill-rule="evenodd" clip-rule="evenodd"></path>
            </svg>
        </button>
        <!-- <button type="button"
            class="text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg px-5 py-2 shadow-sm transition-colors border border-transparent">
            Get Started Free
        </button> -->
        @if (!isUserLogin) {
        <button type="button" routerLink="/login"
            class="text-sm font-semibold text-gray-900 border border-gray-300 dark:border-gray-600 dark:text-white bg-white dark:bg-transparent hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg px-5 py-2 transition-colors">
            Login
        </button>
        }@else{
        <button type="button" (click)="logout()"
            class="text-sm font-semibold text-gray-900 border border-gray-300 dark:border-gray-600 dark:text-white bg-white dark:bg-transparent hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg px-5 py-2 transition-colors">
            Logout
        </button>
        }
    </div>
</header>
