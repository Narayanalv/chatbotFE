<header
    class="w-full h-20 bg-gradient-to-b from-[#ebf5fb]/95 to-[#f0f9ff]/85 dark:from-[#070b19]/95 dark:to-black/85 backdrop-blur-md border-b border-[#b3d7f7]/50 dark:border-zinc-900/80 transition-all duration-300 flex items-center justify-between px-4 sm:px-8 shadow-sm z-40">
    <!-- Brand -->
    <div class="flex items-center gap-3">
        <img class="w-10 h-10 object-contain" src="assets/logo.png" alt="MultiChat AI Logo">
        <h1 class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white">
            ChatBot <span class="bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">AI</span>
        </h1>
    </div>

    <!-- Navigation -->
    <nav class="hidden md:flex items-center gap-2">
        <a routerLink="/"
            routerLinkActive="bg-[#dceefb]/80 dark:bg-cyan-950/45 text-cyan-600 dark:text-cyan-400 font-bold"
            [routerLinkActiveOptions]="{exact: true}"
            class="text-sm font-semibold text-slate-600 dark:text-zinc-400 hover:text-cyan-600 dark:hover:text-cyan-400 transition-all duration-200 px-3.5 py-2 rounded-xl">Home</a>
        @if(isUserLogin) {
        <a routerLink="/dashboard"
            routerLinkActive="bg-[#dceefb]/80 dark:bg-cyan-950/45 text-cyan-600 dark:text-cyan-400 font-bold"
            class="text-sm font-semibold text-slate-600 dark:text-zinc-400 hover:text-cyan-600 dark:hover:text-cyan-400 transition-all duration-200 px-3.5 py-2 rounded-xl">Dashboard</a>
        }
        <a routerLink="/features"
            routerLinkActive="bg-[#dceefb]/80 dark:bg-cyan-950/45 text-cyan-600 dark:text-cyan-400 font-bold"
            class="text-sm font-semibold text-slate-600 dark:text-zinc-400 hover:text-cyan-600 dark:hover:text-cyan-400 transition-all duration-200 px-3.5 py-2 rounded-xl">Features</a>
        <a routerLink="/technology"
            routerLinkActive="bg-[#dceefb]/80 dark:bg-cyan-950/45 text-cyan-600 dark:text-cyan-400 font-bold"
            class="text-sm font-semibold text-slate-600 dark:text-zinc-400 hover:text-cyan-600 dark:hover:text-cyan-400 transition-all duration-200 px-3.5 py-2 rounded-xl">Technology
            (RAG)</a>
        <a routerLink="/how-it-works"
            routerLinkActive="bg-[#dceefb]/80 dark:bg-cyan-950/45 text-cyan-600 dark:text-cyan-400 font-bold"
            class="text-sm font-semibold text-slate-600 dark:text-zinc-400 hover:text-cyan-600 dark:hover:text-cyan-400 transition-all duration-200 px-3.5 py-2 rounded-xl">How
            it Works</a>
        <a routerLink="/about"
            routerLinkActive="bg-[#dceefb]/80 dark:bg-cyan-950/45 text-cyan-600 dark:text-cyan-400 font-bold"
            class="text-sm font-semibold text-slate-600 dark:text-zinc-400 hover:text-cyan-600 dark:hover:text-cyan-400 transition-all duration-200 px-3.5 py-2 rounded-xl">About</a>
    </nav>

    <!-- Actions -->
    <div class="flex items-center gap-4">
        <!-- Theme Toggle -->
        <button (click)="toggleTheme()"
            class="h-9 w-9 flex items-center justify-center rounded-lg p-1.5 border border-[#b3d7f7] dark:border-slate-800/80 hover:bg-cyan-50/50 dark:hover:bg-slate-900/60 transition-colors text-slate-600 dark:text-slate-300">
            <svg class="fill-current w-5 h-5 hidden dark:block" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
            </svg>
            <svg class="fill-current w-5 h-5 block dark:hidden" viewBox="0 0 20 20">
                <path
                    d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
                    fill-rule="evenodd" clip-rule="evenodd"></path>
            </svg>
        </button>
        @if (!isUserLogin) {
        <a routerLink="/login"
            class="text-sm font-semibold text-slate-800 border border-[#b3d7f7] dark:border-slate-800 dark:text-white bg-transparent hover:bg-cyan-50/50 dark:hover:bg-slate-900/60 rounded-xl px-5 py-2 transition-all duration-200 inline-flex items-center justify-center">
            Login
        </a>
        }@else{
        <button type="button" (click)="logout()"
            class="text-sm font-semibold text-slate-800 border border-[#b3d7f7] dark:border-slate-800 dark:text-white bg-transparent hover:bg-cyan-50/50 dark:hover:bg-slate-900/60 rounded-xl px-5 py-2 transition-all duration-200 active:scale-98">
            Logout
        </button>
        }
    </div>
</header>
