<div class="flex flex-col h-[calc(100vh)] overflow-hidden">
  <app-header />

  <!-- Main layout -->
  <div class="flex flex-1 overflow-hidden relative">
    <!-- Sidebar -->


    <!-- Main Content -->
    <main class="flex-1 overflow-auto p-8">
      <div class="max-w-7xl mx-auto w-full">
        <div class="flex items-center justify-between mb-8">
          <div>
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">Dashboard</h1>
            <p class="mt-1 text-sm text-slate-650 dark:text-zinc-400">Manage and monitor your AI chatbots</p>
          </div>
          <button (click)="addBot = !addBot" [disabled]="apiService.isLoading()"
            class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:opacity-95 font-bold py-2.5 px-6 rounded-xl shadow-lg shadow-cyan-500/25 text-white transition-all flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            New Bot
          </button>
        </div>
        <app-list-bots (toggleAddBot)="addBot = true" [chatBotList]="chatBotList" [addBot]="addBot"
          [botsLoading]="botsLoading"></app-list-bots>
      </div>
      @if(addBot){
      <app-add-bot (close)="addBot = false" (loadBots)="loadBots(true)"></app-add-bot>
      }@else{

      }
    </main>
  </div>
</div>
