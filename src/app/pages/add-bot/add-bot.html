<div class="fixed inset-0 z-50 bg-black/50 backdrop-blur-md w-full h-full p-6 flex justify-center items-center">
    <div
        class="shadow-2xl rounded-2xl bg-gradient-to-br from-[#dceefb]/95 via-[#f0f9ff]/90 to-[#d0e8fc]/95 dark:bg-gradient-to-br dark:from-zinc-950 dark:via-black dark:to-black p-8 flex flex-col items-center justify-center gap-6 w-full max-w-2xl border border-[#b3d7f7] dark:border-zinc-900">

        <div class="w-full text-left">
            <h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Add New Knowledge</h2>
            <p class="text-sm text-slate-600 dark:text-gray-400 mt-1">Provide a title, topic, and file for the bot.</p>
        </div>

        <div class="w-full space-y-5">
            <div class="w-full">
                <label for="input-title"
                    class="block text-sm font-medium mb-2 text-slate-700 dark:text-gray-200">Title</label>
                <input id="input-title" type="text" #title
                    class="py-2.5 sm:py-3 px-4 rounded-xl block w-full bg-[#dceefb]/40 border-[#b3d7f7] dark:bg-zinc-900 dark:border-zinc-800 border sm:text-sm text-slate-900 dark:text-white placeholder:text-slate-500 focus:border-cyan-500 focus:ring-cyan-500/20 transition-colors"
                    placeholder="Enter title">
            </div>

            <div class="w-full">
                <label for="input-topic"
                    class="block text-sm font-medium mb-2 text-slate-700 dark:text-gray-200">Topic</label>
                <input id="input-topic" type="text" #topic
                    class="py-2.5 sm:py-3 px-4 rounded-xl block w-full bg-[#dceefb]/40 border-[#b3d7f7] dark:bg-zinc-900 dark:border-zinc-800 border sm:text-sm text-slate-900 dark:text-white placeholder:text-slate-500 focus:border-cyan-500 focus:ring-cyan-500/20 transition-colors"
                    placeholder="Enter topic">
            </div>
        </div>

        <div class="flex items-center justify-center w-full mt-2">
            <label for="dropzone-file"
                class="flex flex-col items-center justify-center w-full h-64 bg-[#dceefb]/30 dark:bg-zinc-900 border-2 border-dashed border-[#b3d7f7] dark:border-zinc-700 rounded-xl cursor-pointer hover:bg-[#dceefb]/50 dark:hover:bg-zinc-800 transition-colors">
                <div class="flex flex-col items-center justify-center text-body pt-5 pb-6">
                    <svg class="w-10 h-10 mb-4 text-cyan-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                        width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 17h3a3 3 0 0 0 0-6h-.025a5.56 5.56 0 0 0 .025-.5A5.5 5.5 0 0 0 7.207 9.021C7.137 9.017 7.071 9 7 9a4 4 0 1 0 0 8h2.167M12 19v-9m0 0-2 2m2-2 2 2" />
                    </svg>
                    @if (file.files && file.files.length > 0) {
                    <p class="mb-2 text-sm text-green-600 dark:text-green-400 font-semibold">Selected: {{
                        file.files[0].name }}</p>
                    <p class="text-xs text-slate-500 dark:text-gray-400">Click to change file</p>
                    } @else {
                    <p class="mb-2 text-sm text-slate-700 dark:text-gray-200"><span
                            class="font-semibold text-cyan-600 dark:text-cyan-400">Click to upload</span> or drag
                        and drop</p>
                    <p class="text-xs text-slate-500 dark:text-gray-400">Any supported document or file</p>
                    }
                </div>
                <input id="dropzone-file" type="file" accept=".pdf" #file (change)="0" class="hidden" />
            </label>
        </div>

        <div class="w-full flex justify-end gap-3 mt-4">
            <button type="button" (click)="close.emit()" [disabled]="apiService.isLoading()"
                class="py-2.5 px-6 rounded-xl text-slate-700 dark:text-gray-200 bg-[#dceefb]/40 dark:bg-zinc-900 border border-[#b3d7f7] dark:border-zinc-800 hover:bg-[#dceefb]/60 dark:hover:bg-zinc-800 transition-colors text-sm font-semibold shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">Cancel</button>
            <button type="button" (click)="addBot(title.value, topic.value, file.files ? file.files[0] : null)" [disabled]="apiService.isLoading()"
                class="py-2.5 px-6 rounded-xl text-white bg-gradient-to-r from-cyan-500 to-blue-600 hover:opacity-95 transition-all text-sm font-semibold shadow-lg shadow-cyan-500/25 disabled:opacity-50 disabled:cursor-not-allowed">
                {{ apiService.isLoading() ? 'Submitting...' : 'Submit' }}
            </button>
        </div>
    </div>
</div>
